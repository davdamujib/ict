<h2>User CRUD Form</h2>

<form (ngSubmit)="save()">
    <input type="text" name="name" placeholder="Enter Your Name" [(ngModel)]="user.name"><br><br>

    <input type="email" name="email" placeholder="Enter Your Email" [(ngModel)]="user.email"><br><br>

    <input type="password" name="password" placeholder="Enter Password" [(ngModel)]="user.password"><br><br>

    <input type="number" name="age" placeholder="Enter Your Age" [(ngModel)]="user.age"><br><br>

    <input type="tel" name="mobileNumber" placeholder="Enter Phone Number" [(ngModel)]="user.mobileNumber"><br><br>

    <input type="date" name="dob" [(ngModel)]="user.dob"><br><br>

    <label>Gender : </label>
    <input type="radio" value="MALE" name="gender" [(ngModel)]="user.gender"> Male
    <input type="radio" value="FEMALE" name="gender" [(ngModel)]="user.gender"> Female
    <br><br>

    <label>Hobbies</label>
    <input type="checkbox" value="REDDING" (change)="onHobbyChange($event)">Redding
    <input type="checkbox" value="WRITING" (change)="onHobbyChange($event)">Writing
    <input type="checkbox" value="CRICKET" (change)="onHobbyChange($event)">Cricket
    <input type="checkbox" value="MUSIC" (change)="onHobbyChange($event)">Music
    <input type="checkbox" value="GAME" (change)="onHobbyChange($event)">Game
    <br><br>

    <label>Country: </label>
    <select name="country" [(ngModel)]="user.country">

        <option value="">Select Country</option>
        <option value="INDIA">India</option>
        <option value="USA">USA</option>
        <option value="PAKISTAN">Pakistan</option>
    </select><br><br>

    <textarea name="address" placeholder="Enter Your Address" rows="10" [(ngModel)]="user.address"></textarea><br><br>

    <button type="submit">
        {{ isEdit ? 'Update' : 'Submit' }}
    </button>

    <button type="reset" (click)="reset()">Reset</button>


</form>

<hr>

<h2>User List</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    @for (u of users; track u.id) {
    <tr>
        <td>{{u.id}}</td>
        <td>{{u.name}}</td>
        <td>{{u.email}}</td>
        <td>
            <button (click)="edit(u)">Edit</button>
            <button (click)="delete(u.id!)">Delete</button>
        </td>

    </tr>
    }
</table>
